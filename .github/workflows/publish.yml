name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Build GitHub release artifact
        run: pnpm run release:artifact
        env:
          YGGTREE_RELEASE_TAG: ${{ github.ref_name }}

      - name: Attest GitHub release artifact
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist-release/*.tar.gz

      - name: Upload GitHub release artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
          gh release upload "$GITHUB_REF_NAME" dist-release/* --clobber

      - name: Publish to npm
        run: npm publish --access public
