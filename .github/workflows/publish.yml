name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.repository == 'logbookfordevs/yggdrasil-worktree'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release tag
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          tag_version="${tag#v}"
          package_version="$(node -p "require('./package.json').version")"

          if [[ "$tag" != "v$package_version" ]]; then
            echo "Release tag $tag does not match package.json version $package_version."
            exit 1
          fi

          git fetch origin main --depth=1
          release_sha="$(git rev-list -n 1 "$tag")"
          main_sha="$(git rev-parse origin/main)"

          if [[ "$release_sha" != "$main_sha" ]]; then
            echo "Release tag $tag points at $release_sha, but origin/main is $main_sha."
            exit 1
          fi

      - name: Run validation
        run: pnpm test

      - name: Check package contents
        run: pnpm pack --dry-run

      - name: Publish to npm
        run: npm publish --access public
